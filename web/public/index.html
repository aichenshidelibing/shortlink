.signal-field{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;opacity:.78}.signal-field::before,.signal-field::after{content:'';position:absolute;left:-18%;right:-18%;height:1px;background:linear-gradient(90deg,transparent,var(--signal),var(--signal2),transparent);transform:rotate(-7deg);animation:signalDrift 9s var(--motion-ease) infinite}.signal-field::before{top:24%;animation-delay:-2s}.signal-field::after{top:68%;animation-duration:12s;opacity:.58}.signal-dot{position:absolute;width:6px;height:6px;border-radius:999px;background:var(--accent2);box-shadow:0 0 0 8px rgba(0,167,200,.12),0 0 24px rgba(0,167,200,.45);offset-path:path('M -80 420 C 260 140, 520 720, 1220 260');animation:packetRoute 8s var(--motion-ease) infinite}.signal-dot:nth-child(2){animation-delay:-2.8s;offset-path:path('M -60 180 C 280 380, 650 80, 1200 520');background:var(--accent);box-shadow:0 0 0 8px rgba(49,87,255,.12),0 0 24px rgba(49,87,255,.42)}.signal-dot:nth-child(3){animation-delay:-5.1s;animation-duration:10s;opacity:.72}.card,.status-card,.msg,.modal{animation:routeIn .56s var(--motion-ease) both}.status-card{animation-delay:.08s}.brand-icon{animation:nodePulse 5s ease-in-out infinite}.brand h1{background:linear-gradient(90deg,var(--ink),var(--accent),var(--ink));background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:titleScan 7s ease-in-out infinite}.fld,.privacy,#captcha-panel,.btn,.result .act button{transition:transform .18s var(--motion-ease),box-shadow .18s var(--motion-ease),border-color .18s var(--motion-ease),background .18s var(--motion-ease)}.fld:focus-within{transform:translateY(-1px)}.btn{position:relative;overflow:hidden}.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.34),transparent);transform:translateX(-120%);transition:transform .7s var(--motion-ease)}.btn:hover::after{transform:translateX(120%)}.u-bar{transform-origin:bottom;animation:barRise .42s var(--motion-pop) both}.u-bar:nth-child(3n){animation-delay:.03s}.u-bar:nth-child(5n){animation-delay:.06s}.result.on{animation:routeIn .46s var(--motion-pop) both}.is-revealed{animation:routeIn .56s var(--motion-ease) both}
@keyframes routeIn{from{opacity:0;transform:translateY(18px) scale(.985);filter:blur(8px)}to{opacity:1;transform:none;filter:blur(0)}}@keyframes signalDrift{0%{transform:translateX(-8%) rotate(-7deg);opacity:.2}45%{opacity:.8}100%{transform:translateX(8%) rotate(-7deg);opacity:.2}}@keyframes packetRoute{0%{offset-distance:0%;opacity:0;transform:scale(.7)}10%,82%{opacity:1}100%{offset-distance:100%;opacity:0;transform:scale(1.15)}}@keyframes nodePulse{0%,100%{transform:translateY(0);box-shadow:0 18px 42px rgba(49,87,255,.28)}50%{transform:translateY(-2px);box-shadow:0 22px 54px rgba(0,167,200,.28)}}@keyframes titleScan{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}@keyframes barRise{from{transform:scaleY(.18);opacity:.4}to{transform:scaleY(1);opacity:1}}

<body>
<div class="tools"><select id="theme" class="tool-select" onchange="setTheme(this.value)"><option value="system">跟随系统 / System</option><option value="light">浅色 / Light</option><option value="dark">深色 / Dark</option></select><select id="lang" class="tool-select" onchange="setLang(this.value)"><option value="zh">中文</option><option value="en">English</option></select></div>
<div class="bg-default"></div>
<div class="signal-field" aria-hidden="true"><i class="signal-dot"></i><i class="signal-dot"></i><i class="signal-dot"></i></div>
<div class="bg-custom" id="bg-custom">
  <img id="bg-img" alt="">
  <video id="bg-vid" muted loop playsinline></video>
</div>

<main class="pub-shell">
  <section class="ann-wrap"><div id="msgs" class="msgs"></div></section>
  <div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🔗</div>
      <h1>Shortlink</h1>
      <p class="sub">粘贴长链接，即刻生成短链</p>
    </div>

    <div class="fld"><label>目标链接</label><input type="url" id="u" placeholder="https://example.com/your-long-url" autocomplete="off"></div>
    <div class="row">
      <div class="fld"><label>自定义后缀</label><input type="text" id="c" placeholder="可选，4-32位" maxlength="32"></div>
      <div class="fld"><label>访问密码</label><input type="password" id="p" placeholder="可选"></div>
    </div>
    <div class="row">
      <div class="fld"><label>有效期</label><select id="t"></select></div>
      <div class="fld"><label>&nbsp;</label><div class="once-wrap"><label class="once-label"><input type="checkbox" id="o"> 一次性链接</label></div></div>
    </div>
    <div class="fld hidden" id="qr-text-row"><label>二维码文字</label><input type="text" id="qt" maxlength="120" placeholder="可选，显示在二维码下方"></div>
    <div class="privacy">
      <input type="checkbox" id="pr">
      <span>我已阅读并同意 <a href="/help" target="_blank">隐私规则与免责声明</a></span>
    </div>
    <div id="captcha-panel"><div class="captcha-head"><div class="captcha-copy"><div class="captcha-mark">✦</div><div><div class="captcha-title" id="captcha-title">安全验证</div><div class="captcha-desc" id="captcha-desc">在您生成短链时，可能需要验证一下以保证您不是机器人。</div></div></div><span class="captcha-badge" id="captcha-badge">待验证</span></div><div class="cap-widget-wrap" id="cap-wrap"><cap-widget id="cap-widget"></cap-widget></div><div id="cf-box" class="hidden"><div class="cf-turnstile" id="cf-widget"></div></div></div>
    <button class="btn" id="sb" onclick="go()">生成短链 →</button>
    <div class="err" id="er"></div>

    <div class="result" id="rs">
      <div class="lbl">你的短链</div>
      <div class="url" id="ru"></div>
      <div class="lbl" id="ml" style="display:none">管理链接（只显示一次，请保存）</div>
      <div class="url" id="mu" style="display:none;font-size:12px"></div>
      <div id="qr-wrap"><div id="qr"></div><div id="qr-cap" class="qr-caption"></div><img id="qr-logo" class="qr-logo" alt="" style="display:none"></div>
      <div class="act">
        <button onclick="cp()">📋 复制链接</button>
        <button onclick="cm()">🔐 复制管理</button>
        <button onclick="rp()">🚩 举报</button>
        <button onclick="rsf()">🔄 再创一个</button>
      </div>
    </div>
  </div>
  </div>

  <section class="status-card" id="status-card">
    <div class="status-head">
      <div><h2>服务可用性</h2><p>综合 API、数据库和缓存健康状态，展示最近 1h / 24h / 30d 的可用性概览。</p></div>
      <div class="range-tabs"><button data-range="1h" class="on" onclick="setStatusRange('1h')">1h</button><button data-range="24h" onclick="setStatusRange('24h')">24h</button><button data-range="30d" onclick="setStatusRange('30d')">30d</button></div>
    </div>
    <div class="uptime-row">
      <div class="uptime-meta"><div><span class="svc-name" id="status-name">Shortlink</span><span class="status-pill" id="status-pill">在线</span></div><div class="uptime-stats"><span>延迟: <b id="status-latency">-</b></span><span>在线率: <b id="status-uptime">-</b></span><span>最近检测: <b id="status-last">-</b></span><span><b id="status-samples">-</b> 个采样</span></div></div>
      <div class="bar-track" id="status-bars"></div>
      <div class="status-legend"><span class="lg"><i class="sw ok"></i>在线</span><span class="lg"><i class="sw slow"></i>延迟偏高</span><span class="lg"><i class="sw down"></i>异常</span></div>
    </div>
  </section>
</main>

<footer>
  Powered by <strong style="color:var(--accent)">Shortlink</strong>
  <span class="sep">·</span>
  <span id="ver" style="color:var(--t3)"></span>
  <span class="sep">·</span>
  <a href="/help" target="_blank">隐私 &amp; 免责</a>
</footer>

<!-- Report Dialog -->
<div class="overlay" id="rd">
  <div class="modal">
    <h3>🚩 举报短链</h3>
    <div class="fld"><label>短码</label><input type="text" id="rc" placeholder="输入短码"></div>
    <div class="fld"><label>举报原因</label><select id="rr"><option value="">请选择</option><option value="mlm">传销 / 直销</option><option value="porn">色情内容</option><option value="fraud">欺诈 / 钓鱼</option><option value="violence">暴力 / 恐怖</option><option value="spam">垃圾广告</option><option value="other">其他</option></select></div>
    <div class="fld"><label>补充说明（可选）</label><input type="text" id="rt" placeholder="简要描述问题" maxlength="500"></div>
    <div id="report-cap-wrap" class="cap-widget-wrap" style="display:none;margin:12px 0 8px"><div class="captcha-desc" id="report-captcha-desc">请先完成验证后再提交举报。</div><cap-widget id="cap-rpt-widget"></cap-widget></div><div id="cf-rpt" class="hidden"><div class="cf-turnstile" id="cf-rpt-widget"></div></div>
    <div class="btn-row"><button class="btn" onclick="sr()">提交举报</button><button class="btn btn-cancel" onclick="cr()">取消</button></div>
    <div class="err" id="re"></div>
    <div id="rok" style="display:none;color:#10b981;text-align:center;margin-top:10px;font-size:14px;font-weight:600">✓ 举报已提交，感谢反馈</div>
  </div>
</div>

<script>

function initMotion(){if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;const els=document.querySelectorAll('.status-card,.card,.modal');if(!('IntersectionObserver'in window)){els.forEach(e=>e.classList.add('is-revealed'));return}const io=new IntersectionObserver(entries=>{entries.forEach(en=>{if(en.isIntersecting){en.target.classList.add('is-revealed');io.unobserve(en.target)}})},{threshold:.16});els.forEach(e=>io.observe(e))}

function t(k){return (TXT[curLang]&&TXT[curLang][k])||TXT.zh[k]||k}
function friendlyError(err){const map={'rate limit exceeded':'rateLimit','captcha_failed':'invalidCaptcha','captcha required':'captchaRetry','captcha_required':'captchaRetry','captcha_escalation_required':'captchaStrictRetry'};return map[err]?t(map[err]):err}
function applyTheme(mode){const m=mode==='system'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):mode;document.documentElement.dataset.theme=m;document.body.dataset.theme=m;document.documentElement.style.colorScheme=m;localStorage.setItem('sl_pub_theme',mode);document.getElementById('theme').value=mode}
function setTheme(m){applyTheme(m)}
function setLang(l){curLang=l;localStorage.setItem('sl_pub_lang',l);document.getElementById('lang').value=l;renderText()}
function setFavicon(url){if(!url)return;let l=document.querySelector('link[rel="icon"]');if(!l){l=document.createElement('link');l.rel='icon';document.head.appendChild(l)}l.href=url}

function capWidgetI18n(){const en=curLang==='en';return{initial:en?'Verify you are human':'确认你是真人',verifying:en?'Verifying...':'正在验证...',solved:en?'Verified':'已验证',error:en?'Verification failed':'验证失败',troubleshooting:en?'Having trouble?':'遇到问题？',wasm:en?'Verification unavailable':'验证暂不可用',verifyAria:en?'Verify you are human':'确认你是真人',verifyingAria:en?'Verification in progress':'正在验证',verifiedAria:en?'Verified':'已验证',required:en?'Required':'必填',errorAria:en?'Verification error':'验证错误'}}
function applyCapWidgetI18n(el){if(!el)return;const i=capWidgetI18n();el.setAttribute('data-cap-i18n-initial-state',i.initial);el.setAttribute('data-cap-i18n-verifying-label',i.verifying);el.setAttribute('data-cap-i18n-solved-label',i.solved);el.setAttribute('data-cap-i18n-error-label',i.error);el.setAttribute('data-cap-i18n-troubleshooting-label',i.troubleshooting);el.setAttribute('data-cap-i18n-wasm-disabled',i.wasm);el.setAttribute('data-cap-i18n-verify-aria-label',i.verifyAria);el.setAttribute('data-cap-i18n-verifying-aria-label',i.verifyingAria);el.setAttribute('data-cap-i18n-verified-aria-label',i.verifiedAria);el.setAttribute('data-cap-i18n-required-label',i.required);el.setAttribute('data-cap-i18n-error-aria-label',i.errorAria)}
function refreshCaptchaWidgetI18n(){applyCapWidgetI18n(document.getElementById('cap-widget'));applyCapWidgetI18n(document.getElementById('cap-rpt-widget'))}


function renderStatus(){const data=statusPeriods.find(x=>x.key===statusRange)||statusPeriods[0];if(!data)return;document.querySelectorAll('.range-tabs button').forEach(b=>b.classList.toggle('on',b.dataset.range===data.key));document.getElementById('status-name').textContent='Shortlink';const pill=document.getElementById('status-pill');pill.textContent=data.available?t('statusOnline'):t('statusDegraded');pill.className='status-pill '+(data.available?'':'degraded');document.getElementById('status-latency').textContent=(data.latency_ms||0)+'ms';document.getElementById('status-uptime').textContent=(data.uptime_percent??0)+'%';document.getElementById('status-last').textContent=(data.last_checked_min||0)+'m '+(curLang==='en'?'ago':'前');document.getElementById('status-samples').textContent=data.samples||0;const box=document.getElementById('status-bars');box.innerHTML='';(data.bars&&data.bars.length?data.bars:Array(60).fill(data.available?'ok':'down')).forEach(v=>{const el=document.createElement('span');el.className='u-bar '+(v==='down'?'down':v==='slow'?'slow':'ok');box.appendChild(el)})}
function setStatusRange(r){statusRange=r;renderStatus()}
async function loadStatus(){try{const r=await fetch('/api/status');const d=await r.json();statusPeriods=(d.data&&d.data.periods)||[];renderStatus()}catch(e){statusPeriods=[{key:'1h',available:false,latency_ms:0,uptime_percent:0,last_checked_min:0,samples:0,bars:Array(60).fill('down')}];renderStatus()}}

function renderMessages(){const box=document.getElementById('msgs');if(!box)return;box.innerHTML='';if(!publicMessages.length){box.classList.remove('on');return}publicMessages.forEach((m,i)=>{const el=document.createElement('div');el.className='msg '+(['info','success','warn','danger'].includes(m.level)?m.level:'info');const close=document.createElement('button');close.className='close';close.type='button';close.setAttribute('aria-label','关闭消息');close.textContent='×';close.onclick=()=>dismissToast(el);el.appendChild(close);if(m.title){const title=document.createElement('div');title.className='mt';title.textContent=m.title;el.appendChild(title)}if(m.content){const content=document.createElement('div');content.className='mc';content.textContent=m.content;el.appendChild(content)}const tm=document.createElement('div');tm.className='time';tm.textContent='◷ '+new Date().toLocaleString();el.appendChild(tm);const bar=document.createElement('div');bar.className='bar';const fill=document.createElement('i');bar.appendChild(fill);el.appendChild(bar);box.appendChild(el);setTimeout(()=>dismissToast(el),8000+i*700)});box.classList.add('on')}
function dismissToast(el){if(!el||el.dataset.closing)return;el.dataset.closing='1';el.style.animation='toastOut .22s ease forwards';setTimeout(()=>{el.remove();const box=document.getElementById('msgs');if(box&&!box.children.length)box.classList.remove('on')},230)}
function renderText(){document.documentElement.lang=curLang==='en'?'en':'zh-CN';document.querySelector('.brand h1').textContent=t('title');document.querySelector('.brand .sub').textContent=t('sub');document.querySelectorAll('.fld label')[0].textContent=t('url');document.querySelectorAll('.fld label')[1].textContent=t('custom');document.querySelectorAll('.fld label')[2].textContent=t('pass');document.querySelectorAll('.fld label')[3].textContent=t('ttl');document.querySelector('.once-label').lastChild.nodeValue=' '+t('once');document.querySelector('.privacy span').innerHTML=t('privacy')+'<a href="/help" target="_blank">'+t('privacyLink')+'</a>';document.getElementById('sb').textContent=t('submit');document.querySelector('.result .lbl').textContent=t('result');document.getElementById('ml').textContent=t('manage');document.querySelector('#status-card h2').textContent=t('statusTitle');document.querySelector('#status-card .status-head p').textContent=t('statusDesc');const statLabels=document.querySelectorAll('#status-card .uptime-stats span');if(statLabels[0])statLabels[0].innerHTML=(curLang==='en'?'Latency':'延迟')+': <b id="status-latency">-</b>';if(statLabels[1])statLabels[1].innerHTML=(curLang==='en'?'Uptime':'在线率')+': <b id="status-uptime">-</b>';if(statLabels[2])statLabels[2].innerHTML=(curLang==='en'?'Last check':'最近检测')+': <b id="status-last">-</b>';if(statLabels[3])statLabels[3].innerHTML='<b id="status-samples">-</b> '+t('statusSamples');const legend=document.querySelectorAll('.status-legend .lg');if(legend[0])legend[0].lastChild.nodeValue=' '+t('statusOnline');if(legend[1])legend[1].lastChild.nodeValue=' '+t('statusSlow');if(legend[2])legend[2].lastChild.nodeValue=' '+t('statusDown');document.getElementById('captcha-title').textContent=t('captchaTitle');document.getElementById('captcha-desc').textContent=captchaEscalated?t('captchaStrictDesc'):t('captchaDesc');document.querySelector('#rd h3').textContent='🚩 '+t('reportTitle');const rok=document.getElementById('rok');if(rok)rok.textContent=t('reportOk');const rptLabels=document.querySelectorAll('#rd .fld label');if(rptLabels[0])rptLabels[0].textContent=t('reportCode');if(rptLabels[1])rptLabels[1].textContent=t('reportReason');if(rptLabels[2])rptLabels[2].textContent=t('reportExtra');const rr=document.getElementById('rr');if(rr){const loc=curLang==='en'?['','Scam / Direct sales','Pornographic content','Fraud / Phishing','Violence / Terrorism','Spam / Ads','Other']:['','传销 / 直销','色情内容','欺诈 / 钓鱼','暴力 / 恐怖','垃圾广告','其他'];[...rr.options].forEach((o,i)=>{if(loc[i]!==undefined)o.textContent=loc[i]})}const rptBtns=document.querySelectorAll('#rd .btn-row .btn');if(rptBtns[0])rptBtns[0].textContent=t('reportSubmit');if(rptBtns[1])rptBtns[1].textContent=t('reportCancel');document.querySelector('footer a').textContent=t('footerLink');const acts=document.querySelectorAll('.result .act button');if(acts[0])acts[0].textContent=t('copy');if(acts[1])acts[1].textContent=t('manageCopy');if(acts[2])acts[2].textContent=t('report');if(acts[3])acts[3].textContent=t('again');const qrl=document.querySelector('#qr-text-row label');if(qrl)qrl.textContent=t('qrText');renderTTL();refreshCaptchaWidgetI18n();syncCaptchaLabels();renderStatus()}


function ttlLabel(v){v=Number(v)||0;if(v===0)return curLang==='en'?'Never':'永不过期';const units=[[31536000,curLang==='en'?'year':'年'],[2592000,curLang==='en'?'month':'个月'],[604800,curLang==='en'?'week':'周'],[86400,curLang==='en'?'day':'天'],[3600,curLang==='en'?'hour':'小时'],[60,curLang==='en'?'min':'分钟']];for(const [sec,name] of units){if(v%sec===0)return (v/sec)+' '+name}return v+'s'}
function renderTTL(){const sel=document.getElementById('t');if(!sel)return;let opts=[...new Set((ttlOptions||[]).map(Number).filter(x=>x>=0))];if(!ttlAllowNever)opts=opts.filter(x=>x>0);if(!opts.length)opts=ttlAllowNever?[0]:[ttlDefault||3600];opts.sort((a,b)=>a-b);sel.innerHTML='';opts.forEach(v=>{const o=document.createElement('option');o.value=String(v);o.textContent=ttlLabel(v);sel.appendChild(o)});const want=String(ttlDefault||0);sel.value=opts.includes(Number(want))?want:String(opts[0])}
function renderQRControls(){const row=document.getElementById('qr-text-row');if(row)row.classList.toggle('hidden',!qrAllowUser)}

async function lc(){
  try{
    const r=await fetch('/api/config');
    const d=await r.json();
    if(d.data){
      bgUrl=d.data.bg_url||'';bgType=d.data.bg_type||'image';
      cfKey=d.data.cf_site_key||'';needPv=d.data.require_privacy!==false;
      appVer=d.data.version||'';favUrl=d.data.favicon_url||'';captchaCfg={enabled:!!d.data.captcha_enabled,provider:d.data.captcha_provider||'cap',capSiteKey:d.data.cap_site_key||'',capEndpoint:d.data.cap_api_endpoint||'',escalationProvider:d.data.captcha_escalation_provider||'turnstile'};publicMessages=Array.isArray(d.data.public_messages)?d.data.public_messages:[];ttlDefault=Number(d.data.ttl_default_seconds)||0;ttlAllowNever=d.data.ttl_allow_never!==false;ttlOptions=Array.isArray(d.data.ttl_options)?d.data.ttl_options:[0,3600,86400,604800,2592000];qrShowDirect=d.data.qr_show_direct!==false;qrAllowUser=!!d.data.qr_allow_user_customize;qrDefaultText=d.data.qr_default_text||'';qrDefaultTemplate=d.data.qr_default_template||'classic';qrLogoEnabled=!!d.data.qr_logo_enabled;qrLogoUrl=d.data.qr_logo_url||'';
    }
  }catch(e){}
  if(favUrl)setFavicon(favUrl);renderTTL();renderQRControls();ib();initCaptchaPanel();initReportCaptchaPanel();iv();renderText();renderMessages();loadStatus();initMotion();document.getElementById('lang').value=curLang;applyTheme(localStorage.getItem('sl_pub_theme')||'system');
}


function setCaptchaBadge(text,mode){const b=document.getElementById('captcha-badge');if(b){b.textContent=text;b.className='captcha-badge '+(mode||'')}}
function setReportCaptchaText(text){const el=document.getElementById('report-captcha-desc');if(el)el.textContent=text}
function setupCapWidget(el,endpoint,onSolve,onError){if(!el||!endpoint)return false;applyCapWidgetI18n(el);el.setAttribute('data-cap-api-endpoint',endpoint);el.setAttribute('data-cap-worker-count','1');if(el.dataset.capBound==='1')return true;el.dataset.capBound='1';el.addEventListener('solve',onSolve);el.addEventListener('error',onError);return true}
function ensureCapScript(){if(document.getElementById('cap-widget-script'))return;const s=document.createElement('script');s.id='cap-widget-script';s.type='module';s.src='/cap/assets/widget.js';s.onerror=()=>{s.src='https://cdn.jsdelivr.net/npm/@cap.js/widget'};document.head.appendChild(s)}
function getCapToken(){return capToken||document.querySelector('#cap-widget input[name="cap-token"]')?.value||document.querySelector('#cap-widget [name="cap-token"]')?.value||''}
function getReportCapToken(){return reportCapToken||document.querySelector('#cap-rpt-widget input[name="cap-token"]')?.value||document.querySelector('#cap-rpt-widget [name="cap-token"]')?.value||''}
function initCaptchaPanel(){const panel=document.getElementById('captcha-panel');if(!panel)return;panel.classList.toggle('on',!!captchaCfg.enabled);panel.classList.toggle('need-cap',captchaCfg.enabled&&captchaCfg.provider==='cap');if(!captchaCfg.enabled)return;const cap=document.getElementById('cap-widget');if(cap&&captchaCfg.capEndpoint){setupCapWidget(cap,captchaCfg.capEndpoint,e=>{capToken=e.detail?.token||e.detail||getCapToken();syncCaptchaLabels()},e=>{capToken='';syncCaptchaLabels();const desc=document.getElementById('captcha-desc');if(desc)desc.textContent=e.detail?.message||t('captchaFailDesc')});ensureCapScript()}}
function initReportCaptchaPanel(){const wrap=document.getElementById('report-cap-wrap');if(wrap)wrap.style.display=captchaCfg.enabled?'block':'none';if(!captchaCfg.enabled)return;const cap=document.getElementById('cap-rpt-widget');if(cap&&captchaCfg.capEndpoint){setupCapWidget(cap,captchaCfg.capEndpoint,e=>{reportCapToken=e.detail?.token||e.detail||getReportCapToken();setReportCaptchaText(t('reportCaptchaSolved'))},e=>{reportCapToken='';setReportCaptchaText(e.detail?.message||t('captchaFailDesc'))});ensureCapScript()}}
function ensureTurnstileScript(){if(!cfKey||document.getElementById('turnstile-script')||turnstileLoading)return;turnstileLoading=true;const s=document.createElement('script');s.id='turnstile-script';s.src='https://challenges.cloudflare.com/turnstile/v0/api.js';s.async=true;s.defer=true;s.onload=()=>{turnstileLoading=false;ic()};s.onerror=()=>{turnstileLoading=false};document.head.appendChild(s)}
function syncCaptchaLabels(){setCaptchaBadge(captchaEscalated?t('captchaStrictBadge'):(capToken?t('captchaSolved'):t('captchaBadge')),captchaEscalated?'warn':(capToken?'ok':''));const desc=document.getElementById('captcha-desc');if(desc)desc.textContent=captchaEscalated?t('captchaStrictDesc'):t('captchaDesc');setReportCaptchaText(reportCapToken?t('reportCaptchaSolved'):t('reportCaptchaDesc'))}
function resetCapWidgetById(id){const el=document.getElementById(id);if(!el)return;try{if(typeof el.reset==='function'){el.reset();return}}catch(e){}const parent=el.parentNode;if(parent){const fresh=document.createElement('cap-widget');fresh.id=id;parent.replaceChild(fresh,el)}}
function resetCaptchaState(){capToken='';reportCapToken='';captchaEscalated=false;resetCapWidgetById('cap-widget');resetCapWidgetById('cap-rpt-widget');initCaptchaPanel();initReportCaptchaPanel();syncCaptchaLabels();if(window.turnstile)try{turnstile.reset('#cf-widget');turnstile.reset('#cf-rpt-widget')}catch(e){}}
function requireTurnstile(reason){captchaEscalated=true;const p=document.getElementById('captcha-panel');if(p)p.classList.add('on');const box=document.getElementById('cf-box');if(box&&cfKey)box.classList.remove('hidden');const rpt=document.getElementById('cf-rpt');if(rpt&&cfKey)rpt.classList.remove('hidden');const desc=document.getElementById('captcha-desc');if(desc)desc.textContent=reason||t('captchaStrictDesc');setReportCaptchaText(reason||t('captchaStrictDesc'));syncCaptchaLabels();ensureTurnstileScript();ic()}
function handleCaptchaError(d){const cap=d&&d.captcha;if(!cap&&!['captcha_required','captcha_escalation_required'].includes(d&&d.error))return false;if(cap?.provider==='turnstile'||d.error==='captcha_escalation_required'){resetCaptchaState();requireTurnstile(cap?.reason);return true}resetCaptchaState();document.getElementById('captcha-panel')?.classList.add('on');const rpt=document.getElementById('report-cap-wrap');if(rpt)rpt.style.display='block';syncCaptchaLabels();return true}

function iv(){
  const el=document.getElementById('ver');
  if(el&&appVer)el.textContent='v'+appVer;
}

function ic(){
  const b=document.getElementById('cf-box'),r=document.getElementById('cf-rpt');
  if(!cfKey){b.classList.add('hidden');r.classList.add('hidden');return}
  b.classList.remove('hidden');r.classList.remove('hidden');
  document.getElementById('cf-widget').setAttribute('data-sitekey',cfKey);
  document.getElementById('cf-rpt-widget').setAttribute('data-sitekey',cfKey);
  if(window.turnstile){try{turnstile.render('#cf-widget',{sitekey:cfKey});turnstile.render('#cf-rpt-widget',{sitekey:cfKey});}catch(e){}}
}

function ib(){
  if(!bgUrl)return;
  document.querySelector('.bg-default').style.opacity='0';
  const w=document.getElementById('bg-custom');w.style.display='block';
  if(bgType==='video'){
    const v=document.getElementById('bg-vid');v.src=bgUrl;v.style.display='block';v.play().catch(()=>{});
  }else{
    const i=document.getElementById('bg-img');i.src=bgUrl;i.style.display='block';
  }
}

async function go(){
  const u=document.getElementById('u'),c=document.getElementById('c'),p=document.getElementById('p'),
    ttl=document.getElementById('t'),o=document.getElementById('o'),pr=document.getElementById('pr'),
    er=document.getElementById('er'),sb=document.getElementById('sb');
  er.textContent='';
  let url=u.value.trim();
  if(!url){er.textContent=t('needUrl');u.focus();return}
  url=smartUrl(url);
  if(needPv&&!pr.checked){er.textContent=t('needPrivacy');return}
  sb.disabled=true;sb.textContent=t('creating');
  try{
    const fd=new FormData();
    fd.append('url',url);fd.append('privacy_agree','true');
    if(c.value.trim())fd.append('custom_code',c.value.trim());
    if(p.value.trim())fd.append('password',p.value.trim());
    if(+ttl.value || ttl.value==='0')fd.append('ttl',ttl.value);const qt=document.getElementById('qt');if(qrAllowUser&&qt&&qt.value.trim())fd.append('qr_text',qt.value.trim());
    if(o.checked)fd.append('is_once','true');
    const cap=getCapToken(); if(captchaCfg.enabled&&captchaCfg.provider==='cap'&&cap)fd.append('cap_token',cap);
    const cf=document.querySelector('#cf-widget [name="cf-turnstile-response"]')?.value;
    if(cf)fd.append('cf_turnstile_response',cf);
    const r=await fetch('/api/links',{method:'POST',body:fd});
    const d=await r.json();
    if(!r.ok){if(handleCaptchaError(d)){er.textContent=d.error==='captcha_escalation_required'?t('captchaStrictRetry'):t('captchaRetry');return}er.textContent=friendlyError(d.error)||t('createdFail');return}
    document.getElementById('ru').textContent=d.data.short_url;
    if(d.data.manage_url){document.getElementById('mu').textContent=d.data.manage_url;document.getElementById('mu').style.display='block';document.getElementById('ml').style.display='block';document.querySelectorAll('.result .act button')[1].style.display=''}
    const rs=document.getElementById('rs');rs.classList.add('on');
    const showQR=d.data.qr_show_direct!==undefined?d.data.qr_show_direct:qrShowDirect;
    const qw=document.getElementById('qr-wrap'),q=document.getElementById('qr'),qrCap=document.getElementById('qr-cap'),logo=document.getElementById('qr-logo');
    q.innerHTML='';qw.classList.toggle('hidden',!showQR);qw.classList.remove('qr-card-card','qr-card-compact');
    const tpl=d.data.qr_template||qrDefaultTemplate||'classic';qw.classList.add('qr-card-'+tpl);
    if(showQR){new QRCode(q,{text:d.data.short_url,width:140,height:140,colorDark:'#0f172a',colorLight:'#fff'});qrCap.textContent=d.data.qr_text||qrDefaultText||'';const lu=d.data.qr_logo_url||qrLogoUrl;if((d.data.qr_logo_enabled||qrLogoEnabled)&&lu){logo.src=lu;logo.style.display='block'}else{logo.style.display='none'}}
    resetCaptchaState();
  }catch(e){er.textContent=t('net')}
  finally{sb.disabled=false;sb.textContent=t('submit')}
}

function smartUrl(v){v=v.trim();if(!v)return v;if(/^https?:\/\//i.test(v))return v;if(/^\/\//.test(v))return 'https:'+v;if(/^[a-z][a-z0-9+.-]*:/i.test(v)&&!/^[^:]+:\d/.test(v))return v;return 'https://'+v}
function cp(){
  const text=document.getElementById('ru').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const b=event.target;const orig=b.textContent;
    b.textContent=t('copied');b.style.color='var(--accent)';
    setTimeout(()=>{b.textContent=orig;b.style.color=''},1500);
  });
}

function cm(){const text=document.getElementById('mu').textContent;if(!text)return;navigator.clipboard.writeText(text).then(()=>{const b=event.target;const orig=b.textContent;b.textContent=t('copied');b.style.color='var(--accent)';setTimeout(()=>{b.textContent=orig;b.style.color=''},1500);});}

function rsf(){
  ['u','c','p','qt'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  document.getElementById('o').checked=false;
  document.getElementById('rs').classList.remove('on');document.getElementById('mu').textContent='';document.getElementById('mu').style.display='none';document.getElementById('ml').style.display='none';
  document.getElementById('er').textContent='';
  resetCaptchaState();
}

function rp(){
  const code=document.getElementById('ru')?.textContent.split('/').pop()||'';
  document.getElementById('rc').value=code;
  document.getElementById('rd').classList.add('on');
  document.getElementById('re').textContent='';
  document.getElementById('rok').style.display='none';
  initReportCaptchaPanel();
  syncCaptchaLabels();
}

function cr(){document.getElementById('rd').classList.remove('on')}

async function sr(){
  const c=document.getElementById('rc').value.trim(),
    r=document.getElementById('rr').value,
    extra=document.getElementById('rt').value.trim(),
    er=document.getElementById('re');
  er.textContent='';
  if(!c||!r){er.textContent=t('reportNeed');return}
  try{
    const cf=document.querySelector('#cf-rpt-widget [name="cf-turnstile-response"]')?.value;
    const cap=getReportCapToken()||getCapToken();
    const headers={'Content-Type':'application/json'}; if(cf)headers['X-CF-Turnstile-Token']=cf; if(cap)headers['X-CAP-Token']=cap;
    const res=await fetch('/api/report',{method:'POST',headers,body:JSON.stringify({short_code:c,reason:r,custom_text:extra,cap_token:cap,cf_turnstile_response:cf})});
    const d=await res.json();
    if(!res.ok){if(handleCaptchaError(d)){er.textContent=d.error==='captcha_escalation_required'?t('captchaStrictRetry'):t('captchaRetry');return}er.textContent=friendlyError(d.error)||t('reportFail');return}
    document.getElementById('rok').style.display='block';
    resetCaptchaState();
    setTimeout(cr,2000);
  }catch(e){er.textContent=t('reportNet')}
}

if(window.matchMedia)matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if((localStorage.getItem('sl_pub_theme')||'system')==='system')applyTheme('system')});
window.addEventListener('load',lc);
</script>
