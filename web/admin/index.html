tion:transform .18s var(--motion-ease)}
@keyframes adminRouteIn{from{opacity:0;transform:translateY(14px);filter:blur(7px)}to{opacity:1;transform:none;filter:blur(0)}}@keyframes adminSignal{0%{transform:translateX(-8%) rotate(-7deg);opacity:.12}45%{opacity:.75}100%{transform:translateX(8%) rotate(-7deg);opacity:.12}}@keyframes adminNodePulse{0%,100%{transform:translateY(0);box-shadow:0 14px 34px rgba(49,87,255,.38)}50%{transform:translateY(-2px);box-shadow:0 20px 48px rgba(0,167,200,.30)}}@keyframes adminBarFill{from{transform:scaleX(.08);transform-origin:left;opacity:.5}to{transform:scaleX(1);transform-origin:left;opacity:1}}@keyframes adminLoginIn{from{opacity:0;transform:translateY(18px) scale(.98);filter:blur(10px)}to{opacity:1;transform:none;filter:blur(0)}}

<script>
const { createApp, ref, reactive, computed, nextTick, onMounted } = Vue;
const { ElMessage, ElMessageBox } = ElementPlus;
const _base = window.location.pathname.split('/')[1] || '';
function b(path) { return _base ? '/' + _base + path : path; }
async function api(path, opts = {}) {
  const h = {}; if (opts.body && typeof opts.body === 'string') h['Content-Type'] = 'application/json';
  const r = await fetch(path, { ...opts, headers: h });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'request failed');
  return j.data || j;
}

const LABELS={
  zh:{overview:'概览',manage:'管理',security:'安全',system:'系统',dashboard:'数据总览',status:'系统状态',links:'短链管理',reports:'举报审核',apikeys:'API Keys',securityCenter:'安全中心',settings:'系统设置',logout:'🚪 退出登录',loginSub:'管理后台 · 请输入管理员凭据',username:'用户名',password:'密码',totp:'TOTP 验证码',login:'登 录',verifying:'验证中…',dashboardDesc:'实时查看系统运行数据',statusDesc:'服务运行指标与健康检测',totalLinks:'短链总数',totalClicks:'总点击量',pendingReports:'待处理举报',activeBans:'活跃封禁',systemHealth:'系统健康',totpTitle:'TOTP 双重认证',totpDesc:'请先用 Authenticator 扫描二维码，再输入 6 位动态验证码确认启用。验证成功后，下次登录才会要求动态验证码。',totpEnabled:'已启用',totpPending:'待验证',totpInput:'输入 6 位验证码',totpVerify:'验证并启用',totpVerifying:'验证中…'},
  en:{overview:'Overview',manage:'Manage',security:'Security',system:'System',dashboard:'Dashboard',status:'System status',links:'Links',reports:'Reports',apikeys:'API Keys',securityCenter:'Security Center',settings:'Settings',logout:'🚪 Logout',loginSub:'Admin console · Enter credentials',username:'Username',password:'Password',totp:'TOTP code',login:'Login',verifying:'Verifying…',dashboardDesc:'Realtime service metrics',statusDesc:'Runtime health and diagnostics',totalLinks:'Total links',totalClicks:'Total clicks',pendingReports:'Pending reports',activeBans:'Active bans',systemHealth:'System health',totpTitle:'TOTP two-factor authentication',totpDesc:'Scan the QR code with an authenticator app, then enter the 6-digit code to confirm. TOTP is required at login only after verification succeeds.',totpEnabled:'Enabled',totpPending:'Pending verification',totpInput:'Enter 6-digit code',totpVerify:'Verify and enable',totpVerifying:'Verifying…'}
};
function applyTheme(mode){const m=mode==='system'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):mode;document.documentElement.setAttribute('data-theme',m);document.body.setAttribute('data-theme',m);document.documentElement.style.colorScheme=m;localStorage.setItem('sl_admin_theme',mode)}
function applyLang(lang){localStorage.setItem('sl_admin_lang',lang);document.documentElement.lang=lang==='en'?'en':'zh-CN'}
function setFavicon(url){if(!url)return;let l=document.querySelector('link[rel="icon"]');if(!l){l=document.createElement('link');l.rel='icon';document.head.appendChild(l)}l.href=url}

let adminCFKey='', adminCFRendered=false, adminCaptchaCfg={enabled:false,capEndpoint:''}, adminCapToken='',adminTurnstileLoading=false;
window.CAP_CUSTOM_WASM_URL='/cap/assets/cap_wasm_bg.wasm';window.CAP_DISABLE_WIDGET_REF=true;
function onAdminTurnstileReady(){renderAdminTurnstile()}
function ensureAdminTurnstileScript(){if(!adminCFKey||document.getElementById('admin-turnstile-script')||adminTurnstileLoading)return;adminTurnstileLoading=true;const s=document.createElement('script');s.id='admin-turnstile-script';s.src='https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onAdminTurnstileReady';s.async=true;s.defer=true;s.onload=()=>{adminTurnstileLoading=false;renderAdminTurnstile()};s.onerror=()=>{adminTurnstileLoading=false};document.head.appendChild(s)}
function renderAdminTurnstile(){if(!adminCFKey||!window.turnstile||adminCFRendered)return;try{turnstile.render('#admin-cf-widget',{sitekey:adminCFKey});adminCFRendered=true}catch(e){}}
function ensureAdminCapScript(){if(document.getElementById('admin-cap-widget-script'))return;const s=document.createElement('script');s.id='admin-cap-widget-script';s.type='module';s.src='/cap/assets/widget.js';s.onerror=()=>{s.src='https://cdn.jsdelivr.net/npm/@cap.js/widget'};document.head.appendChild(s)}
function adminCapI18n(){const en=(localStorage.getItem('sl_admin_lang')||'zh')==='en';return{initial:en?'Verify you are human':'确认你是真人',verifying:en?'Verifying...':'正在验证...',solved:en?'Verified':'已验证',error:en?'Verification failed':'验证失败',troubleshooting:en?'Having trouble?':'遇到问题？',wasm:en?'Verification unavailable':'验证暂不可用',verifyAria:en?'Verify you are human':'确认你是真人',verifyingAria:en?'Verification in progress':'正在验证',verifiedAria:en?'Verified':'已验证',required:en?'Required':'必填',errorAria:en?'Verification error':'验证错误'}}
function applyAdminCapI18n(w){if(!w)return;const i=adminCapI18n();w.setAttribute('data-cap-i18n-initial-state',i.initial);w.setAttribute('data-cap-i18n-verifying-label',i.verifying);w.setAttribute('data-cap-i18n-solved-label',i.solved);w.setAttribute('data-cap-i18n-error-label',i.error);w.setAttribute('data-cap-i18n-troubleshooting-label',i.troubleshooting);w.setAttribute('data-cap-i18n-wasm-disabled',i.wasm);w.setAttribute('data-cap-i18n-verify-aria-label',i.verifyAria);w.setAttribute('data-cap-i18n-verifying-aria-label',i.verifyingAria);w.setAttribute('data-cap-i18n-verified-aria-label',i.verifiedAria);w.setAttribute('data-cap-i18n-required-label',i.required);w.setAttribute('data-cap-i18n-error-aria-label',i.errorAria)}
function renderAdminCap(){if(!adminCaptchaCfg.enabled||!adminCaptchaCfg.capEndpoint)return;ensureAdminCapScript();const w=document.getElementById('admin-cap-widget');if(!w)return;applyAdminCapI18n(w);w.setAttribute('data-cap-api-endpoint',adminCaptchaCfg.capEndpoint);w.setAttribute('data-cap-worker-count','1');if(w.dataset.capBound==='1')return;w.dataset.capBound='1';w.addEventListener('solve',e=>{adminCapToken=e.detail?.token||e.detail||getAdminCapToken()})}
function getAdminCapToken(){return adminCapToken||document.querySelector('#admin-cap-widget input[name="cap-token"]')?.value||document.querySelector('[name="cap-token"]')?.value||''}


createApp({
  setup() {
    const isLogin = ref(false), cp = ref('dashboard'), loading = ref(false);
    const lu = ref(''), lp = ref(''), lt = ref(''), le = ref(''), cfLoginEnabled = ref(false), captchaLoginEnabled = ref(false);
    const dash = reactive({ tl: 0, tc: 0, pr: 0, ab: 0 });
    const st = reactive({ db: '...', redis: '...', uptime: '', goroutines: 0, mem_alloc: 0, mem_heap: 0, mem_sys: 0, mem_stack: 0, num_gc: 0, last_gc_seconds: -1, go_version: '', version: '', suffix: '', cpu_count: 0, container_mem: 0, container_limit: 0, container_pct: 0, container_limit_known: false, host_total: 0, host_used: 0, host_avail: 0, host_pct: 0, load1: '-', load5: '-', load15: '-', disk_total: 0, disk_used: 0, disk_free: 0, disk_pct: 0 });
    const links = ref([]), keys = ref([]), bans = ref([]), reports = ref([]), auditLogs = ref([]), domains = ref([]);
    const totpUri = ref(''), totpCode = ref(''), totpVerified = ref(false), totpLoading = ref(false);
    const s = reactive({
      suffix: '', shortlink_length: 6,
      cf_enabled: false, cf_site_key: '', cf_secret_key: '',
      captcha_enabled: false, captcha_provider: 'cap', captcha_mode: 'adaptive', captcha_normal_provider: 'cap', captcha_escalation_provider: 'turnstile', captcha_failure_threshold: 3, captcha_risk_window_seconds: 600, cap_site_key: '', cap_api_endpoint: '', cap_secret_key: '', cap_verify_url: '', playcaptcha_enabled: false, playcaptcha_site_key: '', playcaptcha_secret_key: '', playcaptcha_endpoint: '',
      feishu: false, feishu_webhook: '', feishu_secret: '',
      telegram: false, tg_token: '', tg_chat: '',
      dingtalk: false, ding_webhook: '', ding_secret: '',
      wecom: false, wecom_webhook: '',
      bark: false, bark_key: '', bark_endpoint: '',
      discord: false, discord_webhook: '',
      email: false, email_host: '', email_port: '587', email_user: '', email_pass: '', email_from: '', email_to: '',
      webhook: false, webhook_url: '', webhook_secret: '',
      rate_create: 10, rate_redirect: 60, rate_whitelist: '',
      bg_url: '', bg_type: 'image',
      mod_enabled: false, mod_openai_key: '', mod_auto_delete: false,
      bot_mode: 'off', bot_min_trust: 0.7, bot_min_reports: 5, bot_max_auto_daily: 100,
      report_daily_limit: 20, report_min_interval: 5,
      version: 'BETA2.0-ALPHA', favicon_url: '', public_messages: [],
      ttl_default_seconds: 0, ttl_max_seconds: 31536000, ttl_allow_never: true, ttl_options_selected: [0,3600,86400,604800,2592000], ttl_custom_default: 3600, ttl_custom_max: 31536000,
      domain_allowlist: '', domain_blocklist: '', risk_interstitial_enabled: true, risk_interstitial_threshold: 50, risk_block_threshold: 85,
      qr_show_direct: true, qr_allow_user_customize: false, qr_default_template: 'classic', qr_default_text: '', qr_logo_enabled: false, qr_logo_url: '',
    });
    const appVersion = ref('');
	    const themeMode = ref(localStorage.getItem('sl_admin_theme') || 'system');
	    const lang = ref(localStorage.getItem('sl_admin_lang') || 'zh');
	    applyTheme(themeMode.value); applyLang(lang.value);
	    const setThemeMode = (m) => { themeMode.value=m; applyTheme(m); };
	    const tt = (k) => (LABELS[lang.value] && LABELS[lang.value][k]) || LABELS.zh[k] || k;
    const L = (zh, en) => (lang.value === 'en' ? en : zh);
	    const setLang = (l) => { lang.value=l; applyLang(l); nextTick(renderAdminCap); };
	    if (window.matchMedia) matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(themeMode.value==='system')applyTheme('system')});
		    fetch('/api/config').then(r=>r.json()).then(j=>{const d=j.data||{}; if(d.cf_enabled&&d.cf_site_key){cfLoginEnabled.value=true; adminCFKey=d.cf_site_key; nextTick(()=>{ensureAdminTurnstileScript();renderAdminTurnstile()})} if(d.captcha_enabled&&d.captcha_provider==='cap'&&d.cap_api_endpoint){captchaLoginEnabled.value=true; adminCaptchaCfg={enabled:true,capEndpoint:d.cap_api_endpoint}; nextTick(renderAdminCap)}}).catch(()=>{});

    const doLogin = async () => {
      le.value = ''; loading.value = true;
      try {
        const cf=document.querySelector('#admin-cf-widget [name="cf-turnstile-response"]')?.value||'';
        const cap=getAdminCapToken();
        await api(b('/api/login'), { method: 'POST', body: JSON.stringify({ username: lu.value, password: lp.value, totp: lt.value, cap_token: cap, cf_turnstile_response: cf }) });
        isLogin.value = true; nav('dashboard');
        try { const v = await api(b('/api/version')); if (v && v.version) appVersion.value = v.version; } catch(e){}
      } catch (e) { le.value = e.message; }
      finally { loading.value = false; }
    };
    const doLogout = async () => {
      try { await api(b('/api/logout'), { method: 'POST' }); } catch(e){}
      isLogin.value = false; lu.value = ''; lp.value = ''; lt.value = '';
    };

    const ldDash = async () => {
      try { const d = await api(b('/api/dashboard')); dash.tl = d.total_links; dash.tc = d.total_clicks; dash.pr = d.pending_reports||0; dash.ab = d.active_bans||0; } catch(e){}
      try {
        const d = await api(b('/api/status'));
        st.db = d.database?.status||'?'; st.redis = d.redis?.status||'?';
        st.uptime = d.server?.uptime||''; st.goroutines = d.server?.goroutines||0;
        st.mem_alloc = d.server?.mem_alloc_mb||0; st.mem_heap = d.server?.mem_heap_mb||0; st.mem_sys = d.server?.mem_sys_mb||0; st.mem_stack = d.server?.mem_stack_mb||0;
        st.num_gc = d.server?.num_gc||0; st.last_gc_seconds = d.server?.last_gc_seconds ?? -1; st.go_version = d.server?.go_version||''; st.cpu_count = d.server?.cpu_count||0;
        st.version = d.server?.version||''; st.suffix = d.admin?.suffix||'';
        st.container_mem = d.container?.memory_usage_mb||0; st.container_limit = d.container?.memory_limit_mb||0; st.container_pct = d.container?.memory_percent||0; st.container_limit_known = !!d.container?.limit_known;
        st.host_total = d.host?.memory?.total_mb||0; st.host_used = d.host?.memory?.used_mb||0; st.host_avail = d.host?.memory?.available_mb||0; st.host_pct = d.host?.memory?.used_percent||0;
        st.load1 = d.host?.load?.load1||'-'; st.load5 = d.host?.load?.load5||'-'; st.load15 = d.host?.load?.load15||'-';
        st.disk_total = d.host?.disk?.total_mb||0; st.disk_used = d.host?.disk?.used_mb||0; st.disk_free = d.host?.disk?.free_mb||0; st.disk_pct = d.host?.disk?.used_percent||0;
        if (st.version && !appVersion.value) appVersion.value = st.version;
      } catch(e){}
    };
    const ldLinks = async () => { try { const d = await api(b('/api/links')); links.value = (d.list||[]).map(l=>({...l,created_at:l.created_at?new Date(l.created_at).toLocaleString():''})); } catch(e){} };
    const delLink = async (code) => { try { await ElMessageBox.confirm('确认删除短链 '+code+' ?','删除确认',{type:'warning',confirmButtonText:'删除',cancelButtonText:'取消'}); await api(b('/api/links/'+code),{method:'DELETE'}); ElMessage.success('已删除'); ldLinks(); } catch(e){} };
    const ldKeys = async () => { try { keys.value = await api(b('/api/apikeys')); } catch(e){} };
    const createKey = async () => { try { const name=prompt('Key 名称','Key-'+Date.now()); if(!name)return; const purpose=prompt('用途说明','')||''; const permissions=(prompt('权限，逗号分隔','links:create,links:batch_create,stats:read_own')||'links:create').split(',').map(x=>x.trim()).filter(Boolean); const quota_per_day=+(prompt('每日额度，0=不限','0')||0); const d = await api(b('/api/apikeys'),{method:'POST',body:JSON.stringify({name,purpose,permissions,quota_per_day})}); ElMessage.success('API Key: '+d.api_key); ldKeys(); } catch(e){ElMessage.error(e.message)} };
    const revokeKey = async (id) => { try { await api(b('/api/apikeys/'+id+'/revoke'),{method:'POST'}); ElMessage.success('已吊销'); ldKeys(); } catch(e){ElMessage.error(e.message)} }; const delKey = async (id) => { try { await ElMessageBox.confirm('确认删除此 API Key?','删除确认',{type:'warning'}); await api(b('/api/apikeys/'+id),{method:'DELETE'}); ldKeys(); } catch(e){} };
    const ldBans = async () => { try { bans.value = await api(b('/api/bans')); } catch(e){} };
    const doUnban = async (id) => { try { await api(b('/api/bans/'+id),{method:'DELETE'}); ElMessage.success('已解封'); ldBans(); ldDash(); } catch(e){} };
    const ldReports = async () => { try { reports.value = await api(b('/api/reports?status=0')); } catch(e){} };
    const doHandle = async (id, action) => { try { await api(b('/api/reports/'+id),{method:'POST',body:JSON.stringify({action})}); ElMessage.success('已处理'); ldReports(); ldDash(); } catch(e){ ElMessage.error(e.message); } };
    const doAuto = async () => {
      try {
        const d = await api(b('/api/reports/auto-process'),{method:'POST'});
        ElMessage.success(`Bot: ${d.approved||0} 通过, ${d.rejected||0} 驳回, ${d.pending||0} 待审`);
        ldReports(); ldDash();
      } catch(e) { ElMessage.error(e.message); }
    };
    const doReload = async () => { try { await api(b('/api/wordfilter/reload'),{method:'POST'}); ElMessage.success('敏感词库已重载'); } catch(e){} };
    const ldAudit = async () => { try { const d=await api(b('/api/audit?page=1&size=50')); auditLogs.value=d.list||[]; } catch(e){} };
    const ldDomains = async () => { try { domains.value=await api(b('/api/domains')); } catch(e){} };
    const addDomain = async () => { try { const hostname=prompt('域名，例如 s.example.com',''); if(!hostname)return; const purpose=prompt('用途 public/admin/both','public')||'public'; await api(b('/api/domains'),{method:'POST',body:JSON.stringify({hostname,purpose,force_https:true,enabled:true})}); ldDomains(); } catch(e){ElMessage.error(e.message)} };
    const delDomain = async (id) => { try { await api(b('/api/domains/'+id),{method:'DELETE'}); ldDomains(); } catch(e){ElMessage.error(e.message)} };

    const ldSettings = async () => {
      try {
        const d = await api(b('/api/settings'));
        s.suffix = d.suffix||''; s.shortlink_length = d.shortlink_length||6;
        if (d.version) { s.version = d.version; appVersion.value = d.version; }
        if (d.settings) { try { const parsed=JSON.parse(d.settings); Object.assign(s, parsed); if(s.cap_site_key){if(!s.cap_api_endpoint||/^https?:\/\/cap\.example\.com/i.test(s.cap_api_endpoint))s.cap_api_endpoint='/cap/'+s.cap_site_key+'/'; if(!s.cap_verify_url||s.cap_verify_url==='admin'||/^https?:\/\/cap\.example\.com/i.test(s.cap_verify_url))s.cap_verify_url='http://cap:3000/'+s.cap_site_key+'/siteverify'} if(Array.isArray(parsed.ttl_options))s.ttl_options_selected=parsed.ttl_options; if(s.ttl_default_seconds&&!TTL_PRESETS.some(x=>x.value===s.ttl_default_seconds))s.ttl_custom_default=s.ttl_default_seconds; if(s.ttl_max_seconds&&!TTL_PRESETS.some(x=>x.value===s.ttl_max_seconds))s.ttl_custom_max=s.ttl_max_seconds; if(s.favicon_url)setFavicon(s.favicon_url); } catch(e){} }
      } catch(e){}
      try { const d = await api(b('/api/totp')); totpUri.value = d.uri||''; totpVerified.value = !!d.verified; nextTick(()=>{ const el=document.getElementById('qr-totp'); if(el&&totpUri.value){el.innerHTML='';const dark=document.documentElement.dataset.theme==='dark';new QRCode(el,{text:totpUri.value,width:120,height:120,colorDark:dark?'#f8fafc':'#1e293b',colorLight:dark?'#0f172a':'#fff'});} }); } catch(e){}
    };
    const doVerifyTOTP = async () => {
      if (!/^\d{6}$/.test(totpCode.value.trim())) { ElMessage.error(lang.value==='en'?'Enter a 6-digit code':'请输入 6 位验证码'); return; }
      totpLoading.value = true;
      try {
        await api(b('/api/totp/verify'), { method:'POST', body: JSON.stringify({ code: totpCode.value.trim() }) });
        totpVerified.value = true; totpCode.value = '';
        ElMessage.success(lang.value==='en'?'TOTP enabled':'TOTP 已启用');
      } catch(e) { ElMessage.error(e.message); }
      finally { totpLoading.value = false; }
    };

    const ensureMessages = () => { if (!Array.isArray(s.public_messages)) s.public_messages = []; };
    const addPublicMessage = () => { ensureMessages(); s.public_messages.push({ enabled:true, level:'info', title:'', content:'' }); };
    const removePublicMessage = (idx) => { ensureMessages(); s.public_messages.splice(idx,1); };


    const TTL_PRESETS = [{label:'永不过期',value:0},{label:'1 小时',value:3600},{label:'1 天',value:86400},{label:'7 天',value:604800},{label:'30 天',value:2592000},{label:'90 天',value:7776000},{label:'1 年',value:31536000}];

      try {
        ensureMessages();

      try {
        const payload = {
          rate_create: Math.max(1, Math.round(Number(s.rate_create) || 0)),

        <div class="frow"><div class="fi"><label>钉钉</label><select v-model="s.dingtalk"><option :value="false">关闭</option><option :value="true">启用</option></select></div></div>

        <div class="frow"><div class="fi"><label>Discord</label><select v-model="s.discord"><option :value="false">关闭</option><option :value="true">启用</option></select></div></div>
        <div v-if="s.discord" class="frow"><div class="fi"><label>Webhook URL</label><input v-model="s.discord_webhook"></div></div>

        <div v-if="s.mod_enabled" class="frow"><div class="fi"><label>OpenAI API Key</label><input type="password" v-model="s.mod_openai_key" placeholder="sk-..."></div><div class="fi"><label>高置信自动删除</label><select v-model="s.mod_auto_delete"><option :value="false">关闭</option><option :value="true">启用</option></select></div></div>

          <div class="fi"><label>Bot 模式</label><select v-model="s.bot_mode"><option value="off">关闭（手动审核）</option><option value="approve_all">全部自动通过</option><option value="reject_all">全部自动驳回</option><option value="smart">智能判断（推荐）</option></select></div>

          <div class="fi"><label>每日自动上限</label><input type="number" v-model.number="s.bot_max_auto_daily" min="1"></div>

        <div class="frow">
          <div class="fi"><label>举报间隔（秒）</label><input type="number" v-model.number="s.report_min_interval" min="3" max="60"></div>

        <div class="frow"><div class="fi"><label>{{L('背景图片/视频 URL','Background image/video URL')}}</label><input v-model="s.bg_url" :placeholder="L('留空使用默认渐变背景','Leave blank for default gradient background')"></div><div class="fi"><label>{{L('类型','Type')}}</label><select v-model="s.bg_type"><option value="image">{{L('图片','Image')}}</option><option value="video">{{L('视频','Video')}}</option></select></div></div>

        <div style="margin-top:36px;padding-top:24px;border-top:1px solid var(--border)"><button class="btn1" style="padding:14px 48px;font-size:15px" @click="doSave">💾 {{L('保存全部设置','Save all settings')}}</button></div>
