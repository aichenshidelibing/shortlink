services:
  app:
    build: .
    container_name: shortlink-app
    ports:
      # Bind to loopback only. Public exposure is the reverse proxy's job
      # (see nginx/ or your host firewall). Publishing on 0.0.0.0 would
      # bypass any host-level auth/TLS and hand the whole admin panel to
      # anyone who can reach the box on this port.
      - "${HTTP_BIND:-127.0.0.1}:${HTTP_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET:-}
      - CONFIG_PATH=/app/configs/missing-env-only.yaml
      - SERVER_PORT=${SERVER_PORT:-8080}
      - SERVER_MODE=${SERVER_MODE:-release}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-shortlink}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-shortlink}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - HASHIDS_SALT=${HASHIDS_SALT:-}
      - SNOWFLAKE_WORKER_ID=${SNOWFLAKE_WORKER_ID:-1}
      - SNOWFLAKE_DATACENTER_ID=${SNOWFLAKE_DATACENTER_ID:-1}
      - CAPTCHA_ENABLED=${CAPTCHA_ENABLED:-false}
      - CAPTCHA_PROVIDER=${CAPTCHA_PROVIDER:-cap}
      - CAPTCHA_MODE=${CAPTCHA_MODE:-adaptive}
      - CAPTCHA_NORMAL_PROVIDER=${CAPTCHA_NORMAL_PROVIDER:-cap}
      - CAPTCHA_ESCALATION_PROVIDER=${CAPTCHA_ESCALATION_PROVIDER:-turnstile}
      - CAPTCHA_FAILURE_THRESHOLD=${CAPTCHA_FAILURE_THRESHOLD:-3}
      - CAPTCHA_RISK_WINDOW_SECONDS=${CAPTCHA_RISK_WINDOW_SECONDS:-600}
      - CAP_SITE_KEY=${CAP_SITE_KEY:-}
      - CAP_SECRET_KEY=${CAP_SECRET_KEY:-}
      - CAP_VERIFY_URL=${CAP_VERIFY_URL:-}
      - CAP_API_ENDPOINT=${CAP_API_ENDPOINT:-}
      - CAP_ADMIN_KEY=${CAP_ADMIN_KEY:-}
      - CAP_HTTP_PORT=${CAP_HTTP_PORT:-3000}
      - CAP_INTERNAL_URL=${CAP_INTERNAL_URL:-http://cap:3000}
    networks:
      - shortlink
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      cap:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      # The image ships its own HEALTHCHECK (see Dockerfile). We repeat
      # it here so `docker compose ps` can gate future services on it.
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:$${SERVER_PORT:-8080}/api/config\" >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    logging:
      # Cap log growth so long-running deployments don't fill /var/lib/docker.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  cap:
    image: tiago2/cap:latest
    container_name: shortlink-cap
    environment:
      - ADMIN_KEY=${CAP_ADMIN_KEY:?CAP_ADMIN_KEY is required}
      - REDIS_URL=redis://cap-valkey:6379
      - ENABLE_ASSETS_SERVER=true
      - WIDGET_VERSION=latest
      - WASM_VERSION=latest
    ports:
      # Local dashboard escape hatch only. The public widget/API path is
      # proxied by the Shortlink app at /cap/, so public reverse proxies only
      # need to expose the Shortlink service domain.
      - "${CAP_HTTP_BIND:-127.0.0.1}:${CAP_HTTP_PORT:-23000}:3000"
    networks:
      - shortlink
    depends_on:
      cap-valkey:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  cap-valkey:
    image: valkey/valkey:9-alpine
    container_name: shortlink-cap-valkey
    command: valkey-server --save 60 1 --loglevel warning --maxmemory-policy noeviction
    volumes:
      - cap-valkey-data:/data
    networks:
      - shortlink
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  mysql:
    image: mysql:8.4
    container_name: shortlink-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${DB_NAME:-shortlink}
      - MYSQL_USER=${DB_USER:-shortlink}
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+00:00 --mysql-native-password=ON
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - shortlink
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:8.8.0-alpine
    container_name: shortlink-redis
    # requirepass hardens the redis instance even though it's on a private
    # docker network — defense-in-depth in case the compose file is later
    # reused with an exposed port.
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - shortlink
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  shortlink:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  cap-valkey-data:
